<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Дайвинг клуб в Самаре — обучение, снаряжение, погружения">
    <title>{% block title %}Дайверы{% endblock %}</title>

    <!-- Font Awesome (Solid + Brands) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Глобальные стили -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <!-- Стили для конкретной страницы -->
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Навигация -->
    {% include "includes/header.html" %}

    <!-- Основной контент -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Подвал -->
    {% include "includes/footer.html" %}

    <!-- SVG Liquid Glass Filter -->
    <svg style="display: none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="liquidGlass">
                <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="turbulence" seed="5"/>
                <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="20" xChannelSelector="R" yChannelSelector="G"/>
                <feGaussianBlur stdDeviation="1"/>
                <feColorMatrix type="saturate" values="1.5"/>
            </filter>
        </defs>
    </svg>

    <!-- Глобальные скрипты -->
    <script>
    // === ГАМБУРГЕР МЕНЮ ===
    document.addEventListener('DOMContentLoaded', function() {
        const hamburger = document.getElementById('navbar-toggle');
        const navMenu = document.getElementById('navbar-menu');
        const navLinks = document.querySelectorAll('.navbar-menu a');

        // Создаём оверлей для затемнения
        const overlay = document.createElement('div');
        overlay.className = 'menu-overlay';
        document.body.appendChild(overlay);

        // Открыть/закрыть меню
        function toggleMenu() {
            if (hamburger && navMenu) {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.classList.toggle('menu-open');
            }
        }

        // Клик по гамбургеру
        if (hamburger) {
            hamburger.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMenu();
            });
        }

        // Закрыть при клике на ссылку
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                if (navMenu.classList.contains('active')) {
                    toggleMenu();
                }
            });
        });

        // Закрыть при клике на оверлей
        overlay.addEventListener('click', toggleMenu);

        // Закрыть при клике вне меню (только на мобильных)
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 1024) {
                if (hamburger && navMenu &&
                    !hamburger.contains(e.target) &&
                    !navMenu.contains(e.target) &&
                    navMenu.classList.contains('active')) {
                    toggleMenu();
                }
            }
        });

        // Закрыть при изменении размера экрана
        window.addEventListener('resize', function() {
            if (window.innerWidth > 1024 && navMenu?.classList.contains('active')) {
                toggleMenu();
            }
        });

        // === КНОПКА "НАВЕРХ" ===
        const scrollToTop = document.querySelector('.scroll-to-top');
        if (scrollToTop) {
            window.addEventListener('scroll', function() {
                if (window.scrollY > 400) {
                    scrollToTop.classList.add('visible');
                } else {
                    scrollToTop.classList.remove('visible');
                }
            });
        }
    });
    </script>

    <!-- Скрипты для конкретной страницы -->
    {% block extra_js %}{% endblock %}

</body>
</html>
